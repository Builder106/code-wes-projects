name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v7
    
    - name: Use Node.js
      uses: actions/setup-node@v7
      with:
        node-version: '24'

    - name: Install & Build Proposal Email
      working-directory: ./proposal-email
      run: |
        npm install
        npm run build --if-present
